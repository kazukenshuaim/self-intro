{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>アカウント登録</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">登録</button>
        </form>
        <p class="mt-2">
            すでにアカウントをお持ちの方は <a href="{% url 'accounts:login' %}">こちら</a>
        </p>
    </div>
</div>
{% endblock %}
